name: Daily IEEE Digest
# Sends the daily paper digest email from GitHub Actions.

on:
  schedule:
    # Primary 08:00 Beijing time (UTC+8).
    - cron: "0 0 * * *"
    # Backup wake-ups. GitHub schedule can be delayed for hours; the script
    # sends only once per Beijing date and only after 07:30 Asia/Shanghai.
    - cron: "0 20 * * *"
    - cron: "0 21 * * *"
    - cron: "0 22 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      force_send:
        description: "Bypass today's already-sent guard for a manual delivery test"
        required: false
        default: false
        type: boolean

jobs:
  send-digest:
    runs-on: ubuntu-latest
    concurrency:
      group: daily-ieee-digest
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send daily digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          DIGEST_DAYS_BACK: "1095"
          DIGEST_MAX_ARTICLES: "2"
          DIGEST_ROWS_PER_JOURNAL: "100"
          DIGEST_TIMEZONE: "Asia/Shanghai"
          DIGEST_NOT_BEFORE: "07:30"
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && inputs.force_send }}
        run: |
          extra_args=""
          if [ "$FORCE_SEND" = "true" ]; then
            extra_args="--force-send"
          fi
          python scripts/daily_ieee_digest.py --config config/journals.json --send --update-history --once-per-local-date $extra_args

      - name: Commit sent history
        run: |
          if git diff --quiet -- data/sent_history.json; then
            echo "No sent history changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sent_history.json
          git commit -m "Record sent IEEE digest articles"
          git push
